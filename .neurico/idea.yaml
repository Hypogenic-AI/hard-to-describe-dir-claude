idea:
  title: Manipulation of Hard to Describe Directions
  domain: nlp
  hypothesis: 'There exist directions in the residual stream of language models that
    are difficult to manipulate via explicit feature-naming prompts, but if a feature
    is linearly represented in the residual stream, it should be possible to finetune
    a new token to reference and manipulate it more easily.

    '
  background:
    description: 'Some directions in the residual stream of language models are hard
      to manipulate by referring to a specific feature by name. For example, while
      it is easy to prompt a model to rhyme, making its output sound less like an
      AI is more challenging. The hypothesis is that anything linearly represented
      in the residual stream should be easy to finetune a new token to reference,
      making such features easier to manipulate.

      '
  metadata:
